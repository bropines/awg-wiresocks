name: Manual Build & Artifacts

on:
  workflow_dispatch: 
    inputs:
      build_type:
        description: 'Type of assembly'
        required: true
        default: 'release'
        type: choice
        options:
          - 'debug'
          - 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Настройка Go с кэшем (ищем go.sum в папке appctr)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
          cache-dependency-path: 'appctr/go.sum'

      # 2. Настройка Java с кэшем Gradle
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      # 3. Установка gomobile и сборка ядра
      - name: Install gomobile & Build Core
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          cd appctr
          bash build.sh

      # 4. Декодируем ключ (только для релиза)
      - name: Decode Keystore
        if: github.event.inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo $KEYSTORE_BASE64 | base64 -d > my-release-key.jks

      # 5. Собираем Android APK
      - name: Build Android App
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi
        env:
          # Пробрасываем переменные для подписи, которые мы настроили в build.gradle.kts
          KEYSTORE_FILE: ${{ (github.event.inputs.build_type == 'release') && format('{0}/my-release-key.jks', github.workspace) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 6. Сохраняем результат
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: awg-wiresocks-${{ github.event.inputs.build_type }}-apk
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7