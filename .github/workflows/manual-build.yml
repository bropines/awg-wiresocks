name: Manual Build & Artifacts

on:
  workflow_dispatch: 
    inputs:
      build_type:
        description: 'Type of assembly'
        required: true
        default: 'release'
        type: choice
        options:
          - 'debug'
          - 'release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Встроенное кэширование Go, как в твоем соседнем проекте
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
          cache-dependency-path: 'appctr/go.sum'

      # Встроенное кэширование Gradle
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Install gomobile & Build Core
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          cd appctr
          sh build.sh

      # Декодируем ключ только если выбрана релизная сборка
      - name: Decode Keystore
        if: github.event.inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo $KEYSTORE_BASE64 | base64 -d > my-release-key.jks

      - name: Determine Gradle build command
        id: gradle_command
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            echo "command=assembleDebug" >> "$GITHUB_OUTPUT"
          else
            echo "command=assembleRelease" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android App
        run: ./gradlew ${{ steps.gradle_command.outputs.command }}
        env:
          # Передаем путь к ключу только для релиза
          KEYSTORE_FILE: ${{ (github.event.inputs.build_type == 'release') && format('{0}/my-release-key.jks', github.workspace) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: awg-wiresocks-${{ github.event.inputs.build_type }}-apk
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7